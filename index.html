<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>📖 القرآن الكريم</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&family=Amiri&display=swap" rel="stylesheet">

<style>

/* ===== إعداد عام ===== */
*{
  box-sizing: border-box;
}

body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:'Tajawal', sans-serif;
  overflow:hidden;

  background:
    linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.95)),
    url("images/mosque.jpg") no-repeat center/cover;
}

/* ===== تأثير إضاءة خلفية ===== */
body::before{
  content:"";
  position:absolute;
  width:200%;
  height:200%;
  background: radial-gradient(circle, rgba(255,215,0,0.08), transparent 60%);
  animation: glowMove 10s linear infinite;
}

/* ===== الكرت ===== */
.card{
  position:relative;
  text-align:center;
  padding:55px 30px;
  border-radius:25px;

  background:rgba(0,0,0,0.55);
  backdrop-filter:blur(15px);

  box-shadow:
    0 0 60px rgba(0,0,0,0.8),
    0 0 20px rgba(255,215,0,0.15);

  width:90%;
  max-width:420px;

  animation: fadeUp 1.2s ease;
}

/* ===== العنوان ===== */
.title{
  font-family:'Amiri', serif;
  font-size:44px;
  color:#FFD700;

  text-shadow:
    0 0 10px rgba(255,215,0,0.7),
    0 0 25px rgba(255,215,0,0.4);

  margin-bottom:10px;
}

/* ===== وصف ===== */
.subtitle{
  font-size:18px;
  color:#ddd;
  margin-bottom:30px;
  line-height:1.7;
}

/* ===== زر احترافي ===== */
.btn{
  position:relative;
  overflow:hidden;

  background:linear-gradient(45deg,#0d6efd,#00c6ff);
  border:none;
  padding:14px 35px;
  border-radius:12px;
  color:white;
  font-size:17px;
  cursor:pointer;

  box-shadow:
    0 5px 15px rgba(0,0,0,0.5),
    0 0 10px rgba(0,198,255,0.4);

  transition:0.3s;
}

/* تأثير ضوء متحرك داخل الزر */
.btn::before{
  content:"";
  position:absolute;
  top:0;
  left:-100%;
  width:100%;
  height:100%;
  background:linear-gradient(120deg, transparent, rgba(255,255,255,0.4), transparent);
  transition:0.5s;
}

.btn:hover::before{
  left:100%;
}

.btn:hover{
  transform:scale(1.08);
}

.btn:active{
  transform:scale(0.96);
}

/* ===== توقيع ===== */
.dev{
  margin-top:35px;
  font-size:14px;
  color:#aaa;
}

.dev b{
  color:#FFD700;
  text-shadow:0 0 8px rgba(255,215,0,0.5);
}

/* ===== أنيميشن ===== */
@keyframes fadeUp{
  from{
    opacity:0;
    transform:translateY(40px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

@keyframes glowMove{
  0%{transform:translate(-25%, -25%);}
  50%{transform:translate(0%, 0%);}
  100%{transform:translate(-25%, -25%);}
}

/* ===== انتقال الصفحة ===== */
.fade-out{
  animation: fadeOut 0.6s forwards;
}

@keyframes fadeOut{
  to{
    opacity:0;
    transform:scale(1.05);
  }
}

</style>
</head>

<body>

<div class="card">

  <div class="title">📖 القرآن الكريم</div>

  <div class="subtitle">
    مصحف كامل مع التلاوة الصوتية<br>
    تجربة روحانية بتصميم عصري
  </div>

  <button class="btn" onclick="startApp()">ابدأ الآن</button>

  <div class="dev">
    تصميم وتطوير <br>
    <b>D / Salah Al-ahdel</b>
  </div>

</div>

<script>
function startApp(){
  document.body.classList.add("fade-out");

  setTimeout(()=>{
    window.location.href = "index.html";
  },600);
}
</script>

</body>
</html>
