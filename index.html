<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📖 القرآن الكريم</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal&family=Amiri+Quran&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:'Tajawal', sans-serif;
  overflow:hidden;
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
}

/* الغلاف */
#cover{
  position:fixed;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:1000;
  background:
    linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.95)),
    url("images/mosque.jpg") no-repeat center/cover;
  transition:0.6s;
}

#cover.hidden{
  opacity:0;
  pointer-events:none;
}

.card{
  text-align:center;
  padding:55px 30px;
  border-radius:25px;
  background:rgba(0,0,0,0.55);
  backdrop-filter:blur(15px);
}

.title{
  font-size:44px;
  color:#FFD700;
  font-family:'Amiri';
}

.subtitle{
  margin:20px 0;
}

.btn{
  background:linear-gradient(45deg,#0d6efd,#00c6ff);
  border:none;
  padding:12px 30px;
  border-radius:10px;
  color:white;
  cursor:pointer;
}

/* التطبيق */
#app{display:none;height:100vh}
.app{display:flex;height:100%}

.sidebar{
  width:220px;
  background:rgba(0,0,0,0.5);
  padding:10px;
  overflow-y:auto;
}

.sidebar button{
  width:100%;
  padding:10px;
  margin:5px 0;
  border:none;
  border-radius:8px;
  background:#ffffff22;
  color:white;
  cursor:pointer;
}

.sidebar button:hover{background:#00c6ff}

.content{
  flex:1;
  padding:15px;
  overflow-y:auto;
}

#readerSelect,#search{
  width:100%;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
  border:none;
}

/* الآيات */
.ayah{
  font-family:'Amiri Quran';
  font-size:24px;
  line-height:2.2;
  padding:10px;
  margin:8px 0;
  border-radius:10px;
  background:rgba(255,255,255,0.08);
}

.ayah:hover{background:rgba(255,255,255,0.18)}

.active{
  background:#00c6ff55;
  border-right:5px solid #00c6ff;
}

.sajda{
  border-right:4px solid gold;
}

/* المشغل */
.player{
  position:fixed;
  bottom:0;
  width:100%;
  background:rgba(0,0,0,0.8);
  padding:10px;
}

.controls{
  display:flex;
  justify-content:center;
  gap:10px;
}

.controls button{
  padding:10px;
  border:none;
  border-radius:50%;
  background:#00c6ff;
  color:white;
}

#progress{width:100%}
</style>
</head>

<body>

<!-- الغلاف -->
<div id="cover">
  <div class="card">
    <div class="title">📖 القرآن الكريم</div>
    <div class="subtitle">مصحف كامل مع التلاوة الصوتية</div>
    <button class="btn" onclick="startApp()">ابدأ الآن</button>
  </div>
</div>

<!-- التطبيق -->
<div id="app">
<div class="app">

  <div class="sidebar" id="surahList"></div>

  <div class="content">

    <!-- قراء مدعومين -->
    <select id="readerSelect">
      <option value="ar.alafasy">العفاسي</option>
      <option value="ar.minshawi">المنشاوي</option>
      <option value="ar.abdulbasitmurattal">عبدالباسط</option>
      <option value="ar.husary">الحصري</option>
      <option value="ar.mahermuaiqly">ماهر المعيقلي</option>
      <option value="ar.abdurrahmaansudais">السديس</option>
      <option value="ar.ahmedajamy">أحمد العجمي</option>
      <option value="ar.muhammadjibreel">محمد جبريل</option>
    </select>

    <input type="text" id="search" placeholder="🔎 بحث">

    <div id="mushafView"><h2>اختر سورة</h2></div>

  </div>

</div>

<div class="player">
  <div class="controls">
    <button onclick="prevAyah()">⏮</button>
    <button onclick="togglePlay()" id="playBtn">▶</button>
    <button onclick="nextAyah()">⏭</button>
  </div>
  <input type="range" id="progress">
</div>

</div>

<script>

// الغلاف
function startApp(){
  document.getElementById('cover').classList.add('hidden');
  setTimeout(()=>{
    document.getElementById('app').style.display='block';
  },600);
}

// عناصر
const surahList=document.getElementById("surahList");
const mushafView=document.getElementById("mushafView");
const readerSelect=document.getElementById("readerSelect");
const search=document.getElementById("search");
const progress=document.getElementById("progress");
const playBtn=document.getElementById("playBtn");

let ayahs=[];
let currentIndex=0;
let currentSurah=0;
let audio=new Audio();

// تحميل السور
fetch("https://api.alquran.cloud/v1/surah")
.then(r=>r.json())
.then(data=>{
  data.data.forEach(s=>{
    let btn=document.createElement("button");
    btn.textContent=s.name;
    btn.onclick=()=>loadSurah(s.number);
    surahList.appendChild(btn);
  });
});

// تحميل سورة
function loadSurah(num){

  currentSurah=num;

  fetch(`https://api.alquran.cloud/v1/surah/${num}/${readerSelect.value}`)
  .then(r=>r.json())
  .then(data=>{

    mushafView.innerHTML=`<h2>${data.data.name}</h2>`;
    ayahs=data.data.ayahs;

    ayahs.forEach((a,i)=>{
      let div=document.createElement("div");
      div.className="ayah";
      div.innerHTML=`${a.text} <span>(${a.numberInSurah})</span>`;

      if(a.sajda) div.classList.add("sajda");

      div.onclick=()=>playAyah(i);

      mushafView.appendChild(div);
    });

  });
}

// تغيير القارئ
readerSelect.onchange=()=>{
  if(currentSurah) loadSurah(currentSurah);
};

// تشغيل
function playAyah(i){
  currentIndex=i;
  audio.src=ayahs[i].audio;
  audio.play();

  playBtn.textContent="⏸";

  document.querySelectorAll(".ayah").forEach(a=>a.classList.remove("active"));
  document.querySelectorAll(".ayah")[i].classList.add("active");
}

// تحكم
function nextAyah(){ if(currentIndex+1<ayahs.length) playAyah(currentIndex+1); }
function prevAyah(){ if(currentIndex>0) playAyah(currentIndex-1); }

function togglePlay(){
  if(audio.paused){
    audio.play();
    playBtn.textContent="⏸";
  }else{
    audio.pause();
    playBtn.textContent="▶";
  }
}

// progress
audio.ontimeupdate=()=>{
  if(audio.duration){
    progress.value=(audio.currentTime/audio.duration)*100;
  }
};

progress.oninput=()=>{
  if(audio.duration){
    audio.currentTime=(progress.value/100)*audio.duration;
  }
};

// البحث
search.oninput=()=>{
  let val=search.value.trim();

  if(val===""){
    if(currentSurah) loadSurah(currentSurah);
    return;
  }

  let filtered=ayahs.filter(a=>a.text.includes(val));

  mushafView.innerHTML="<h2>نتائج البحث</h2>";

  filtered.forEach(a=>{
    let d=document.createElement("div");
    d.className="ayah";
    d.innerHTML=a.text;
    mushafView.appendChild(d);
  });
};

</script>

</body>
</html>
